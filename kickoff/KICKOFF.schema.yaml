# Schema for runs/{run_id}/KICKOFF.yaml (documentation)

run_id: string
created_utc: string
host: cursor | opencode | generic
run_mode: model_duel | rules_duel
source_codebase: string
reviewer_model: string
reviewer_family: string
scorecard: option-d
greenfield: true

# model_duel only — shared pack
rules_selected: [string]

# rules_duel only
contestant_model: string
rule_packs:
  - pack_id: string
    label: string
    rules: [string]

# model_duel: one entry per model
# rules_duel: usually generated by bootstrap from rule_packs (optional to pre-list)
contestants:
  - arm_id: string
    model: string
    family: string
    web_port: number
    db_port: number
    pack_id: string        # rules_duel
    rules_selected: [string]  # effective pack for this arm

late_joins: []             # optional

include_grill_inventory: bool   # default true for full-suite rebuilds
grill_sees_codebase_inventory: bool  # default false
grill_seed: string

# Spawn shape (Test 1a / Test 5) — see catalog/SPECIALIST-ROLES.md
inventory_mode: single | focused
inventory_jobs: [string]   # if focused, e.g. product, security, data, ui, integrations
self_review_mode: single | focused
self_review_jobs: [string] # if focused, e.g. security, quality, rules, clean-code

tests_selected: [suite] | [1a, 1b, 2, ...]   # after bootstrap multi-select
notes: string
